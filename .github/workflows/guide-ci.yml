name: Guide CI

on:
  push:
    branches:
      - main
    paths:
      - 'guide/**'
      - 'Makefile'
      - 'guide/Makefile'
      - '.github/workflows/guide-ci.yml'
  pull_request:
    paths:
      - 'guide/**'
      - 'Makefile'
      - 'guide/Makefile'
      - '.github/workflows/guide-ci.yml'
  workflow_dispatch:

jobs:
  guide-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: guide/package-lock.json

      - name: Install native build tools (better-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install guide workspaces
        working-directory: guide
        run: npm ci

      - name: Guide server unit tests
        working-directory: guide
        run: npm run test --workspace=server

  guide-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: guide/package-lock.json

      - name: Install native build tools (better-sqlite3)
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install guide workspaces
        working-directory: guide
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: guide/web
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        working-directory: guide/web
        env:
          CI: 'true'
        run: npm run test:e2e

  guide-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-guide-worker-${{ hashFiles('guide/worker/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-guide-worker-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r guide/worker/requirements.txt

      - name: Install system tools (ffmpeg, node for preflight)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          node --version || (curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs)

      - name: Integrator preflight + smoke script CI gate
        run: make smoke-integrator-ci

      - name: Timeline QA gate (subtitle/TTS alignment unit tests)
        run: make validate-renders-ci

      - name: Worker unit tests
        run: make test-guide

      - name: Upload audit report (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-jobs-audit
          path: guide/data/render_jobs_audit.json
          if-no-files-found: ignore